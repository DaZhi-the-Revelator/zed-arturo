name: Build arturo-kernel

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: arturo-kernel-linux-x86_64
            rustflags: "-C target-feature=+crt-static"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: arturo-kernel-linux-aarch64
            rustflags: "-C target-feature=+crt-static"
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: arturo-kernel-macos-x86_64
            rustflags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: arturo-kernel-macos-aarch64
            rustflags: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: arturo-kernel-windows-x86_64.exe
            rustflags: "-C target-feature=+crt-static"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cd arturo-kernel
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="arturo-kernel/target/${{ matrix.target }}/release/arturo-kernel"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            SRC="${SRC}.exe"
          fi
          cp "$SRC" "${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
