id = "arturo"
name = "Arturo"
description = "Arturo language support for Zed with type checking, inlay hints, and intelligent code editing"
version = "1.0.1"
schema_version = 1
authors = ["Ouyang Dazhi <204389009+DaZhi-the-Revelator@users.noreply.github.com>"]
repository = "https://github.com/DaZhi-the-Revelator/zed-arturo"

[grammars.arturo]
repository = "https://github.com/DaZhi-the-Revelator/tree-sitter-arturo"
commit = "08139f8cb842d0f2b2423d72b0dfec7f984b3b37"

[language_servers.arturo-lsp]
name = "Arturo LSP"
languages = ["Arturo"]

[language_servers.arturo-lsp.settings]
